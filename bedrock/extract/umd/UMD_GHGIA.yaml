      compartment: air
      flow: CO2e
      desc: "Table 4-57: Emissions from Electronics Industry (MMT CO2 Eq.)"
      data_reliability: 4
    "4-59":
      class: Chemicals
      unit: MMT CO2e
      compartment: air
      flow: CO2e
      activity: ODS Substitute
      desc: "Table 4-59: Emissions of HFCs, PFCs, and CO2 from ODS Substitutes (MMT CO2 Eq.)"
      data_reliability: 4
    "4-60":
      class: Chemicals
      unit: MMT CO2e
      compartment: air
