# University of Maryland CGS GHGIA (one FBA parquet per table). Raw CSVs stored on GCS at
# ``gs://cornerstone-default/extract/input-data/UMD_GHGIA/2024/`` and locally under
# ``bedrock/extract/input_data/UMD_GHGIA/2024/``
author: 'University of Maryland'
source_name: 'Greenhouse Gas Inventory and Analysis'
source_url: https://ghgi.cgs.umd.edu/data.html
bib_id: UMD_GHGIA
format: csv
url:
  base_url: https://ghgi.cgs.umd.edu/data.html

parse_response_fxn: !script_function:UMD_GHGIA umd_ghgia_parse
gcs_fxn: !script_function:UMD_GHGIA umd_ghgia_load
extract_data_from_raw_sources: False # Not available
years:
  - 2017
  - 2018
  - 2019
  - 2020
  - 2021
  - 2022
  - 2023
  - 2024

# Special table lists — based on EPA_GHGI.yaml parameter names
# Flows as group headers
multi_chem_names: ["4-31", "5-6", "5-15"]
source_No_activity: ["3-14", "3-15"]
# Handle tables with 1 parent level category
source_activity_1: ["3-4", "5-10"]  # fuel listed first, sector nested. Append fuel after sector
source_activity_1_fuel: ["3-8", "3-9", "3-10"]  # fuel listed first, vehicle nested. Append vehicle after fuel.
ghg_fuel: ["3-11", "3-12"]  # ghg listed first, fuel nested. Activity name comes from cell A1
# Tables with sub categories
source_activity_2: ["3-25", "3-26", "3-27", "3-28", "3-29", "3-30"]  # no nesting, cell A2 is blank
rows_as_flows: ["4-35", "4-50", "4-52", "4-59"]

# Optional table overrides
Tables:
  "Chapter 3 - Energy":
    "3-4":
      nested_fuel_sector: true
      flow: CO2
      desc: "Table 3-4: CO2 Emissions from Fossil Fuel Combustion by Fuel Type and Sector (MMT CO2 Eq.)"
      data_reliability: 4
    "3-8":
      class: Chemicals
      unit: MMT CO2e
      compartment: air
      flow: CO2
      desc: "Table 3-8: CO2 Emissions from Fossil Fuel Combustion in Transportation End-Use Sector (MMT CO2 Eq.)"
      data_reliability: 4
    "3-9":
      class: Chemicals
      unit: MMT CO2e
      compartment: air
      flow: CH4
      desc: "Table 3-9: CH4 Emissions from Mobile Combustion (MMT CO2 Eq)"
      data_reliability: 4
    "3-10":
      class: Chemicals
      unit: MMT CO2e
      compartment: air
      flow: N2O
      desc: "Table 3-10: N2O Emissions from Mobile Combustion (MMT CO2 Eq.)"
      data_reliability: 4
    "3-11":
      unit: MMT CO2e
      desc: "Table 3-11: GHG Emissions from Fossil Fuel Combustion in the Industrial Sector (MMT CO2 Eq.)"
      data_reliability: 4
    "3-12":
      class: Chemicals
      unit: MMT CO2e
      compartment: air
      flow: CO2e
      desc: "Table 3-12: GHG Emissions from Fossil Fuel Combustion in the Residential and Commercial Sectors (MMT CO2 Eq.)"
      data_reliability: 4
    "3-14":
      class: Chemicals
      unit: Other
      compartment: air
      flow: CO2
      activity: "__year__ Adjusted Non-Energy Use Fossil Fuel - __type__"
      desc: "Table 3-14: CO2 Emissions from NEU Fossil Fuel Consumption (MMT CO2 Eq. and Percent Carbon)"
      melt_var: FlowName
      layout: non_energy_melt
      two_row_header: true
      data_reliability: 4
    "3-15":
      class: Chemicals
      unit: TBtu
      compartment: air
      desc: "Table 3-15: Adjusted Consumption of Fossil Fuels for NEUs (TBtu)"
      data_reliability: 4
    "3-25":
      activity: "__year__ Adjusted Non-Energy Use Fossil Fuel - __type__"
      unit: Other
      flow: CO2
      desc: "Table 3-25: CH4 Emissions from Petroleum Systems (MMT CO2 Eq.)"
      data_reliability: 4
      class: Chemicals
      compartment: air
      melt_var: FlowName
      layout: non_energy_melt
      two_row_header: true
    "3-26":
      class: Chemicals
      unit: MMT CO2e
      compartment: air
      flow: CO2
      desc: "Table 3-26: CO2 Emissions from Petroleum Systems (MMT)"
      data_reliability: 2
    "3-27":
      class: Chemicals
      unit: MMT CO2e
      compartment: air
      flow: N2O
      desc: "Table 3-27: N2O Emissions from Petroleum Systems (MMT CO2 Eq.)"
      data_reliability: 4
    "3-28":
      class: Chemicals
      unit: MMT CO2e
      compartment: air
      flow: CH4
      desc: "Table 3-28: CH4 Emissions from Natural Gas Systems (MMT CO2 Eq.)"
      data_reliability: 4
    "3-29":
      class: Chemicals
      unit: MMT CO2e
      compartment: air
      flow: CO2
      desc: "Table 3-29: CO2 Emissions from Natural Gas Systems (MMT)"
      data_reliability: 4
    "3-30":
      class: Chemicals
      unit: MMT CO2e
      compartment: air
      flow: N2O
      desc: "Table 3-30: N2O Emissions from Natural Gas Systems (MMT CO2 Eq.)"
      data_reliability: 4

  "Chapter 4 - IPPU":
    "4-31":
      class: Chemicals
      unit: MMT CO2e
      compartment: air
