      data_reliability: 4

  "Chapter 5 - Agriculture":
    "5-3":
      class: Chemicals
      unit: MMT CO2e
      compartment: air
      flow: CH4
      desc: "Table 5-3: CH4 Emissions from Enteric Fermentation (MMT CO2 Eq.)"
      data_reliability: 4
    "5-6":
      class: Chemicals
