author: US Energy Information Administration
source_name: Electric Power Annual
source_url: https://www.eia.gov/electricity/annual/
bib_id: EIA_ElectricPowerAnnual
api_name: EIA_ElectricPowerAnnual
api_key_required: false
format: zip
url:
  base_url: https://www.eia.gov/electricity/annual/xls/epa-__edition_year__.zip
url_replace_fxn: !script_function:EIA_ElectricPowerAnnual electric_power_annual_url_helper
call_response_fxn: !script_function:EIA_ElectricPowerAnnual electric_power_annual_call
gcs_fxn: !script_function:EIA_ElectricPowerAnnual electric_power_annual_load_gcs
parse_response_fxn: !script_function:EIA_ElectricPowerAnnual electric_power_annual_parse
# false: electric_power_annual_load_gcs (local extract-input, then GCS).
# true: electric_power_annual_call (HTTP download from EIA).
# Local ZIP: bedrock/extract/input_data/EIA_ElectricPowerAnnual/epa-2024.zip
extract_data_from_raw_sources: false
# edition_year: EPA publication edition in the ZIP name (epa-{edition_year}.zip), not a data year.
# The 2024 edition (released October 2025) is the current extract source.
edition_year: 2024
# years: calendar years of data inside the edition workbooks (generate with year=2014-2024).
call_all_years: true
years:
  - 2014
  - 2015
  - 2016
  - 2017
  - 2018
  - 2019
  - 2020
  - 2021
  - 2022
  - 2023
  - 2024

# Net generation overlap control (Tables 3.1.A-3.6). A tables drop renewables/totals in B.
exclude_generation_a: &exclude_generation_a
  - Solar
  - Hydroelectric Conventional
  - Renewable Sources Excluding Hydroelectric and Solar
  - Total
  - Total Generation at Utility Scale Facilities
  - Estimated Solar Photovoltaic
  - Estimated Total Solar Photovoltaic
  - Estimated Total Solar
exclude_generation_b: &exclude_generation_b
  - Total Renewable Generation at Utility Scale Facilities
  - Estimated Total Solar Photovoltaic
  - Estimated Total Solar
generation_common: &generation_common
  layout: generation_by_fuel
  flow_name: electricity
  unit: MWh
  flow_amount_scale: 1000
  class: Energy
  flow_type: TECHNOSPHERE_FLOW

# Table keys match EIA workbook basenames in the edition ZIP (e.g. epa_02_02.xlsx).
tables:
  epa_02_02:
    layout: sector_by_provider
    table_label: Table 2.2 Sales and direct use of electricity to ultimate customers
    flow_name: electricity
    activity_produced_by: provider
    activity_consumed_by: sector
    unit: MWh
    flow_amount_scale: 1
    class: Energy
    flow_type: TECHNOSPHERE_FLOW
  epa_02_03:
    layout: sector_by_provider
    table_label: Table 2.3 Revenue from sales of electricity to ultimate customers
    flow_name: electricity
    activity_produced_by: provider
    activity_consumed_by: sector
    unit: USD
    flow_amount_scale: 1000000
    class: Money
    flow_type: TECHNOSPHERE_FLOW
  # Table 2.10 columns are 2023-2024 only; workbook may be absent from older edition ZIPs.
  epa_02_10:
    layout: state_sector_price
    table_label: Table 2.10 Average price of electricity by state
    flow_name: electricity
    provider: Total Electric Industry
    activity_produced_by: provider
    activity_consumed_by: sector
    unit: cents/kWh
    flow_amount_scale: 1
    class: Money
    flow_type: TECHNOSPHERE_FLOW
  epa_02_04:
    layout: sector_by_provider
    table_label: Table 2.4 Average price of electricity to ultimate customers
    flow_name: electricity
    activity_produced_by: provider
    activity_consumed_by: sector
    unit: cents/kWh
    flow_amount_scale: 1
    class: Money
    flow_type: TECHNOSPHERE_FLOW
  epa_02_14:
    layout: electricity_trade
    table_label: Table 2.14 U.S. electricity imports and exports
    unit: MWh
    flow_amount_scale: 1
    class: Energy
    flow_type: TECHNOSPHERE_FLOW
  # Tables 3.1-3.6: sector in ActivityProducedBy; fuel in FlowName.
  epa_03_01_a:
    <<: *generation_common
    table_label: Table 3.1.A Net generation by energy source, all sectors
    sector: Total (all sectors)
    exclude_columns: *exclude_generation_a
    aggregation_note: Fossil, nuclear, and pumped storage; hydro and renewables are in Table 3.1.B.
  epa_03_01_b:
    <<: *generation_common
    table_label: Table 3.1.B Net generation from renewable sources, all sectors
    sector: Total (all sectors)
    exclude_columns: *exclude_generation_b
    aggregation_note: Renewable fuel detail for all sectors.
  epa_03_02_a:
    <<: *generation_common
    table_label: Table 3.2.A Net generation by energy source, electric utilities
    sector: Electric utilities
    exclude_columns: *exclude_generation_a
  epa_03_02_b:
    <<: *generation_common
    table_label: Table 3.2.B Net generation from renewable sources, electric utilities
    sector: Electric utilities
    exclude_columns: *exclude_generation_b
  epa_03_03_a:
    <<: *generation_common
    table_label: Table 3.3.A Net generation by energy source, independent power producers
    sector: Independent power producers
    exclude_columns: *exclude_generation_a
  epa_03_03_b:
    <<: *generation_common
    table_label: Table 3.3.B Net generation from renewable sources, independent power producers
    sector: Independent power producers
    exclude_columns: *exclude_generation_b
  epa_03_04_a:
    <<: *generation_common
    table_label: Table 3.4.A Net generation by energy source, commercial sector
    sector: Commercial sector
    exclude_columns: *exclude_generation_a
  epa_03_04_b:
    <<: *generation_common
    table_label: Table 3.4.B Net generation from renewable sources, commercial sector
    sector: Commercial sector
    exclude_columns: *exclude_generation_b
  epa_03_05_a:
    <<: *generation_common
    table_label: Table 3.5.A Net generation by energy source, industrial sector
    sector: Industrial sector
    exclude_columns: *exclude_generation_a
  epa_03_05_b:
    <<: *generation_common
    table_label: Table 3.5.B Net generation from renewable sources, industrial sector
    sector: Industrial sector
    exclude_columns: *exclude_generation_b
  epa_03_06:
    <<: *generation_common
    table_label: Table 3.6 Net generation by energy source, residential sector
    sector: Residential sector
    exclude_columns: []
  epa_08_03:
    layout: years_as_columns
    table_label: Table 8.3 Revenue and expense statistics for major U.S. investor-owned electric utilities
    activity_produced_by: Investor-owned electric utilities
    # Indented rows are nested sub-accounts of section totals; do not sum FlowName rows.
    aggregation_note: Hierarchical line items are layered and must not be summed across rows.
    revenue_expense_flow_prefix: true
    unit: USD
    flow_amount_scale: 1000000
    class: Money
    flow_type: TECHNOSPHERE_FLOW
