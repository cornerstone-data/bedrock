# CEDA 2023 with FLOWSA-aligned liming allocation.
#
# Changes from CEDA baseline:
# - EPA_GHGI_T_2_1 liming: direct → proportional via BEA 327400 (Lime and Gypsum Products)
# - EPA_GHGI_T_2_1 field_burning: all crop types (Chickpeas, Cotton, Maize, Rice, Soybeans,
#   Wheat, Lentils, Sugarcane) for N2O and CH4 — aligned with FLOWSA (PR #270); Drop 5_29
# - EPA_GHGI_T_5_18 and T_5_19: No change to fertilizer_use already proportional via BEA 325310)

!include:GHG_national_CEDA_2023.yaml
  source_names: !include:GHG_national_CEDA_2023.yaml:source_names
    EPA_GHGI_T_2_1: !include:GHG_national_CEDA_2023.yaml:source_names:EPA_GHGI_T_2_1
      activity_sets:
        !include:GHG_national_CEDA_2023.yaml:source_names:EPA_GHGI_T_2_1:activity_sets
        liming:
          activity_to_sector_mapping: EPA_GHGI_Cornerstone_ag_soils
          selection_fields:
            PrimaryActivity: Liming  # CO2 - aligned with flowsa proportional approach
          attribution_method: proportional
          attribution_source:
            BEA_Detail_Use_AfterRedef:
              year: 2017
              activity_to_sector_mapping: Cornerstone_2025
              selection_fields:
                ActivityProducedBy: {'327400': ''} # Lime and Gypsum Products
        field_burning_n2O:
          selection_fields:
            PrimaryActivity:
              - Field Burning of Agricultural Residues
            FlowName: ["N2O"] # ch4 pulled from T_5_29
          attribution_method: proportional
          attribution_source:
            EPA_GHGI_T_5_29: &field_burning
              year: 2023
              activity_to_sector_mapping: EPA_GHGI_Cornerstone
              selection_fields:
                PrimaryActivity:
                  - Chickpeas
                  - Cotton
                  - Maize
                  - Rice
                  - Soybeans
                  - Wheat
                  - Lentils
                  - Sugarcane
                FlowName:
                  CH4: N2O # replacing flow name
              attribution_method: direct
        field_burning_ch4:
          selection_fields:
            PrimaryActivity:
              - Field Burning of Agricultural Residues
            FlowName: ["CH4"]
          attribution_method: proportional
          attribution_source:
            EPA_GHGI_T_5_29:
              <<: *field_burning
              selection_fields:
                PrimaryActivity:
                  - Chickpeas
                  - Cotton
                  - Maize
                  - Rice
                  - Soybeans
                  - Wheat
                  - Lentils
                  - Sugarcane
                FlowName: ["CH4"]

    EPA_GHGI_T_5_29: !include:GHG_national_CEDA_2023.yaml:source_names:EPA_GHGI_T_5_29
      activity_sets:
        direct_ch4:  # ch4
          selection_fields:
            PrimaryActivity: PASS
