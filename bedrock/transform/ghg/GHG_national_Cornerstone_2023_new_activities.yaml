# CEDA 2023 with new activities from flowsa (Anaerobic Digestion, Ethylene Dichloride, EPA_GHGI_T_4_132).
# Duplicates GHG_national_CEDA_2023; overrides only the identified activity sets and adds new sources.

!include:GHG_national_CEDA_2023.yaml
  source_names: !include:GHG_national_CEDA_2023.yaml:source_names
    EPA_GHGI_T_2_1: !include:GHG_national_CEDA_2023.yaml:source_names:EPA_GHGI_T_2_1
      activity_sets:
        !include:GHG_national_CEDA_2023.yaml:source_names:EPA_GHGI_T_2_1:activity_sets
        direct:
          selection_fields:
            PrimaryActivity:
              - Abandoned Oil and Gas Wells #CH4
              - Abandoned Underground Coal Mines #CH4
              - Adipic Acid Production #N2O
              - Aluminum Production #CO2
              - Ammonia Production #CO2
              - Anaerobic Digestion at Biogas Facilities #CH4 new activity
              - Caprolactam, Glyoxal, and Glyoxylic Acid Production #N2O
              - Carbide Production and Consumption #CO2
              - Cement Production #CO2
              - Coal Mining #CH4, CO2
              - Composting #CH4, N2O
              - Electronics Industry #N2O
              - Ferroalloy Production #CO2, CH4
              - Glass Production #CO2
              - Landfills #CH4
              - Incineration of Waste #N2O and CO2
              - Lime Production #CO2
              - Iron and Steel Production & Metallurgical Coke Production #CO2, CH4
              - Nitric Acid Production #N2O
              - Phosphoric Acid Production #CO2
              - Rice Cultivation #CH4
              - Soda Ash Production #CO2
              - Titanium Dioxide Production #CO2
              - Wastewater Treatment #CH4, N2O
              - Zinc Production #CO2
            FlowName: ["CO2", "CH4", "N2O"] # HFCs and other flows are pulled elsewhere
          attribution_method: direct
        direct3:
          selection_fields:
            PrimaryActivity: PASS  # consolidated into direct
            FlowName: ["CH4", "CO2"]
          attribution_method: direct


    ## Other sources
    EPA_GHGI_T_4_55: !include:GHG_national_CEDA_2023.yaml:source_names:EPA_GHGI_T_4_55  #CO2 for selected petrochemicals
      selection_fields:
        PrimaryActivity:
          - Acrylonitrile
          - Carbon Black
          - Ethylene
          - Ethylene Dichloride
          - Ethylene Oxide
          - Methanol
      attribution_method: direct

    EPA_GHGI_T_4_132: # SF6 and PFCs from Other Product Use
      year: 2023
      activity_to_sector_mapping: EPA_GHGI_CEDA
      fedefl_mapping: GHGI_AR5_100
      attribution_method: direct
