!include:BEA_detail_target.yaml
year: &nipa_year 2017
target_naics_year: 2017
geoscale: national
activity_schema: None

_attribution_sources:
  BEA: &bea # 2017 Make and Use tables
    year: 2017
    activity_to_sector_mapping: BEA_2017_Detail
    exclusion_fields:
      # Drop irrelevant final demand and total sectors
      ActivityConsumedBy: ['T001', 'T004', 'T007', 'T019']
      ActivityProducedBy: ['T007', 'T013', 'T015', 'T016', 'TOP',
                           'MCIF']
    attribution_method: equal

source_names:
  BEA_NIPA:
    geoscale: national
    year: *nipa_year
    data_format: FBA
    clean_fba_before_activity_sets: !script_function:BEA_NIPA extract_table_info
    clean_fba_w_sec: !script_function:BEA_NIPA drop_unassigned
    activity_sets:

      FD_PCE:
        activity_to_sector_mapping: BEA_NIPA_FD_PCE
        selection_fields:
          Table: U20405 # Table 2.4.5U. Personal Consumption Expenditures by Type of Product
        exclusion_fields:
          # Lines 342-402 are BEA's own memorandum/aggregate section (NPISH gross-output
          # breakdown, "Additional aggregates", "Market-based PCE" variants) - restatements
          # of figures already counted in lines 1-341, not additional categories. Several
          # (e.g. "Child care", "Religious organizations' services to households") repeat an
          # identical dollar figure from lines 1-341 under the same bare name and would
          # otherwise be double-counted once matched to PCEBridge.
          Line: [342, 343, 344, 345, 346, 347, 348, 349, 350, 351, 352, 353, 354, 355, 356,
                 357, 358, 359, 360, 361, 362, 363, 364, 365, 366, 367, 368, 369, 370, 371,
                 372, 373, 374, 375, 376, 377, 378, 379, 380, 381, 382, 383, 384, 385, 386,
                 387, 388, 389, 390, 391, 392, 393, 394, 395, 396, 397, 398, 399, 400, 401, 402]
        attribution_method: proportional
        attribute_on: ['ActivityProducedBy']
        attribution_source:
          BEA_PCEBridge:
            <<: *bea
            selection_fields:
              FlowName: "Purchasers' Value"

      FD_PCE_tenant_landlord_durables:
        # NIPA "Tenant-occupied, including landlord durables" has no PCEBridge counterpart
        # by name; PCEBridge's equivalent leaf category is "Tenant landlord durables".
        activity_to_sector_mapping: BEA_NIPA_FD_PCE
        selection_fields:
          Table: U20405 # Table 2.4.5U. Personal Consumption Expenditures by Type of Product
          ActivityProducedBy: "Tenant-occupied, including landlord durables"
          Line: 159
        assign_fields:
          ActivityProducedBy: Tenant landlord durables # matches PCEBridge's PCE Category name
        attribution_method: proportional
        attribute_on: ['ActivityProducedBy']
        attribution_source:
          BEA_PCEBridge:
            <<: *bea
            selection_fields:
              FlowName: "Purchasers' Value"

      # The next 4 activity_sets handle NIPA names carrying a "(part of NNN)" annotation
      # (indicating the line is a partial split of a broader BEA classification group NNN)
      # that PCEBridge's PCE Category names don't carry. Only these 4 of the 8 "(part of
      # NNN)" names in U20405 have a matching PCEBridge leaf once stripped; the other 4
      # (Household appliances, Jewelry and watches, Magazines/newspapers/stationery,
      # Personal care products) do not match under any stripped or aliased form found so
      # far, so they are left as-is (dropped, same as other unmatched subtotals).

      FD_PCE_sporting_equipment:
        activity_to_sector_mapping: BEA_NIPA_FD_PCE
        selection_fields:
          Table: U20405 # Table 2.4.5U. Personal Consumption Expenditures by Type of Product
          ActivityProducedBy: "Sporting equipment, supplies, guns, and ammunition (part of 80)"
          Line: 52
        assign_fields:
          ActivityProducedBy: Sporting equipment, supplies, guns, and ammunition
        attribution_method: proportional
        attribute_on: ['ActivityProducedBy']
        attribution_source:
          BEA_PCEBridge:
            <<: *bea
            selection_fields:
              FlowName: "Purchasers' Value"

      FD_PCE_musical_instruments:
        activity_to_sector_mapping: BEA_NIPA_FD_PCE
        selection_fields:
          Table: U20405 # Table 2.4.5U. Personal Consumption Expenditures by Type of Product
          ActivityProducedBy: "Musical instruments (part of 80)"
          Line: 61
        assign_fields:
          ActivityProducedBy: Musical instruments
        attribution_method: proportional
        attribute_on: ['ActivityProducedBy']
        attribution_source:
          BEA_PCEBridge:
            <<: *bea
            selection_fields:
              FlowName: "Purchasers' Value"

      FD_PCE_recreational_books:
        activity_to_sector_mapping: BEA_NIPA_FD_PCE
        selection_fields:
          Table: U20405 # Table 2.4.5U. Personal Consumption Expenditures by Type of Product
          ActivityProducedBy: "Recreational books (part of 90)"
          Line: 60
        assign_fields:
          ActivityProducedBy: Recreational books
        attribution_method: proportional
        attribute_on: ['ActivityProducedBy']
        attribution_source:
          BEA_PCEBridge:
            <<: *bea
            selection_fields:
              FlowName: "Purchasers' Value"

      FD_PCE_luggage:
        activity_to_sector_mapping: BEA_NIPA_FD_PCE
        selection_fields:
          Table: U20405 # Table 2.4.5U. Personal Consumption Expenditures by Type of Product
          ActivityProducedBy: "Luggage and similar personal items (part of 119)"
          Line: 70
        assign_fields:
          ActivityProducedBy: Luggage and similar personal items
        attribution_method: proportional
        attribute_on: ['ActivityProducedBy']
        attribution_source:
          BEA_PCEBridge:
            <<: *bea
            selection_fields:
              FlowName: "Purchasers' Value"

      FD_IP_direct:
        activity_to_sector_mapping: BEA_NIPA_FD_IP
        selection_fields:
          Table: T50605 # Table 5.6.5. Private Fixed Investment in Intellectual Property Products by Type
          ActivityProducedBy:
            - Research and development
        assign_fields:
          ActivityConsumedBy: Private Fixed Investment
        attribution_method: direct

      FD_IP_proportional:
        activity_to_sector_mapping: BEA_NIPA_FD_IP
        selection_fields:
          Table: T50605 # Table 5.6.5. Private Fixed Investment in Intellectual Property Products by Type
        exclusion_fields:
          ActivityProducedBy:
            - Research and development
        assign_fields:
          ActivityConsumedBy: Private Fixed Investment
        attribution_method: proportional
        attribution_source:
          BEA_Detail_Use_SUT:
            <<: *bea
            selection_fields:
              ActivityConsumedBy: {'F02N00': ''}

      FD_Gov_FedD_CE:
        activity_to_sector_mapping: BEA_NIPA_FD_Gov
        selection_fields:
          Table: T30905 # Table 3.9.5. Government Consumption Expenditures and Gross Investment
          ActivityProducedBy:
            - Consumption expenditures
          Line: 18 # disambiguate from Consumption expenditures at lines 2, 26 (same name, other Gov levels)
        assign_fields:
          ActivityProducedBy: Consumption expenditures (Federal Defense) # matches crosswalk key
          ActivityConsumedBy: Federal Government Defense Consumption Expenditures
        attribution_method: direct
        # attribution_source:
        #   BEA_Detail_Use_SUT:
        #     <<: *bea
        #     selection_fields:
        #       ActivityConsumedBy: {'F06C00': ''}

      FD_Gov_FedD_Equipment:
        activity_to_sector_mapping: BEA_NIPA_FD_Gov
        selection_fields:
          Table: T30905 # Table 3.9.5. Government Consumption Expenditures and Gross Investment
          ActivityProducedBy:
            - Equipment
          Line: 21 # disambiguate from Equipment (29), (37) — same name, different Gov levels
        assign_fields:
          ActivityConsumedBy: Federal Government Defense Investment in Equipment
        attribution_method: proportional
        attribution_source:
          BEA_Detail_Use_SUT:
            <<: *bea
            selection_fields:
              ActivityConsumedBy: {'F06E00': ''}

      FD_Gov_FedD_IP:
        activity_to_sector_mapping: BEA_NIPA_FD_Gov
        selection_fields:
          Table: T30905 # Table 3.9.5. Government Consumption Expenditures and Gross Investment
          ActivityProducedBy:
            - Software
            - Research and development # Direct
          Line: [23, 24] # disambiguate from the FedND (31, 32) and SLG (39, 40) Software/R&D rows
        assign_fields:
          ActivityConsumedBy: Federal Government Defense IP
        attribution_method: proportional
        attribution_source:
          BEA_Detail_Use_SUT:
            <<: *bea
            selection_fields:
              ActivityConsumedBy: {'F06N00': ''}

      FD_Gov_FedD_Structures:
        activity_to_sector_mapping: BEA_NIPA_FD_Gov
        selection_fields:
          Table: T30905 # Table 3.9.5. Government Consumption Expenditures and Gross Investment
          ActivityProducedBy:
            - Structures
          Line: 20 # disambiguate from Structures (28), (36) — same name, different Gov levels
        assign_fields:
          ActivityProducedBy: Structures (Federal Defense) # matches crosswalk key
          ActivityConsumedBy: Federal Government Defense Investment in Structures
        attribution_method: proportional
        attribution_source:
          BEA_Detail_Use_SUT:
            <<: *bea
            selection_fields:
              ActivityConsumedBy: {'F06S00': ''}

      FD_Gov_FedND_CE:
        activity_to_sector_mapping: BEA_NIPA_FD_Gov
        selection_fields:
          Table: T30905 # Table 3.9.5. Government Consumption Expenditures and Gross Investment
          ActivityProducedBy:
            - Consumption expenditures
          Line: 26 # disambiguate from Consumption expenditures at lines 2, 18 (same name, other Gov levels)
        assign_fields:
          ActivityProducedBy: Consumption expenditures (Federal Nondefense) # matches crosswalk key
          ActivityConsumedBy: Federal Government Nondefense Consumption Expenditures
        attribution_method: direct
        # attribution_source:
        #   BEA_Detail_Use_SUT:
        #     <<: *bea
        #     selection_fields:
        #       ActivityConsumedBy: {'F07C00': ''}

      FD_Gov_FedND_Structures:
        activity_to_sector_mapping: BEA_NIPA_FD_Gov
        selection_fields:
          Table: T30905 # Table 3.9.5. Government Consumption Expenditures and Gross Investment
          ActivityProducedBy:
            - Structures
          Line: 28 # disambiguate from Structures (20), (36) — same name, different Gov levels
        assign_fields:
          ActivityProducedBy: Structures (Federal Nondefense) # matches crosswalk key
          ActivityConsumedBy: Federal Government Nondefense Investment in Structures
        attribution_method: proportional
        attribution_source:
          BEA_Detail_Use_SUT:
            <<: *bea
            selection_fields:
              ActivityConsumedBy: {'F07S00': ''}

      FD_Gov_FedND_Equipment:
        activity_to_sector_mapping: BEA_NIPA_FD_Gov
        selection_fields:
          Table: T30905 # Table 3.9.5. Government Consumption Expenditures and Gross Investment
          ActivityProducedBy:
            - Equipment
          Line: 29 # disambiguate from Equipment (21), (37) — same name, different Gov levels
        assign_fields:
          ActivityConsumedBy: Federal Government Nondefense Investment in Equipment
        attribution_method: proportional
        attribution_source:
          BEA_Detail_Use_SUT:
            <<: *bea
            selection_fields:
              ActivityConsumedBy: {'F07E00': ''}

      FD_Gov_FedND_IP:
        activity_to_sector_mapping: BEA_NIPA_FD_Gov
        selection_fields:
          Table: T30905 # Table 3.9.5. Government Consumption Expenditures and Gross Investment
          ActivityProducedBy:
            - Software
            - Research and development # Direct
          Line: [31, 32] # disambiguate from the FedD (23, 24) and SLG (39, 40) Software/R&D rows
        assign_fields:
          ActivityConsumedBy: Federal Government Nondefense IP
        attribution_method: proportional
        attribution_source:
          BEA_Detail_Use_SUT:
            <<: *bea
            selection_fields:
              ActivityConsumedBy: {'F07N00': ''}

      FD_Gov_SLG_CE:
        activity_to_sector_mapping: BEA_NIPA_FD_Gov
        selection_fields:
          Table: T30905 # Table 3.9.5. Government Consumption Expenditures and Gross Investment
          ActivityProducedBy:
            - State and local
          Line: 34 # disambiguate: "State and local" recurs elsewhere in this table at other aggregation levels
        assign_fields:
          ActivityConsumedBy: State and Local Consumption Expenditures
        attribution_method: proportional
        attribution_source:
          BEA_Detail_Use_SUT:
            <<: *bea
            selection_fields:
              ActivityConsumedBy: {'F10C00': ''}

      FD_Gov_SLG_Equipment:
        activity_to_sector_mapping: BEA_NIPA_FD_Gov
        selection_fields:
          Table: T30905 # Table 3.9.5. Government Consumption Expenditures and Gross Investment
          ActivityProducedBy:
            - Equipment
          Line: 37 # disambiguate from Equipment at lines 5, 13, 21, 29 (same name, other Gov levels)
        assign_fields:
          ActivityConsumedBy: State and Local Investment in Equipment
        attribution_method: proportional
        attribution_source:
          BEA_Detail_Use_SUT:
            <<: *bea
            selection_fields:
              ActivityConsumedBy: {'F10E00': ''}

      FD_Gov_SLG_Structures:
        activity_to_sector_mapping: BEA_NIPA_FD_Gov
        selection_fields:
          Table: T30905 # Table 3.9.5. Government Consumption Expenditures and Gross Investment
          ActivityProducedBy:
            - Structures
          Line: 36 # disambiguate from Structures at lines 4, 12, 20, 28 (same name, other Gov levels)
        assign_fields:
          ActivityProducedBy: Structures (State and Local) # matches crosswalk key
          ActivityConsumedBy: State and Local Investment in Structures
        attribution_method: proportional
        attribution_source:
          BEA_Detail_Use_SUT:
            <<: *bea
            selection_fields:
              ActivityConsumedBy: {'F10S00': ''}

      FD_Gov_SLG_IP:
        activity_to_sector_mapping: BEA_NIPA_FD_Gov
        selection_fields:
          Table: T30905 # Table 3.9.5. Government Consumption Expenditures and Gross Investment
          ActivityProducedBy:
            - Software
            - Research and development # Direct
          Line: [39, 40] # disambiguate from the FedD (23, 24) and FedND (31, 32) Software/R&D rows
        assign_fields:
          ActivityConsumedBy: State and Local IP
        attribution_method: proportional
        attribution_source:
          BEA_Detail_Use_SUT:
            <<: *bea
            selection_fields:
              ActivityConsumedBy: {'F10N00': ''}

      FD_Structures1:
        activity_to_sector_mapping: BEA_NIPA_FD_Structures
        selection_fields:
          Table: U50405 # Table 5.4.5. Private Fixed Investment in Structures by Type
          ActivityProducedBy:
           - Single family
           - Multifamily
           - Manufactured homes
           - Dormitories
           - Improvements
           - "Brokers' commissions and other ownership transfer costs"
        assign_fields:
          ActivityConsumedBy: Residential Investment
        attribution_method: proportional
        attribution_source:
          BEA_Detail_Use_SUT:
            <<: *bea
            selection_fields:
              ActivityConsumedBy: {'F02R00': ''}

      FD_Structures1_used:
        # "Net purchases of used structures" recurs at both line 38 (Nonresidential) and
        # line 48 (Residential); split out from FD_Structures1/2 so each occurrence can be
        # relabeled to its own crosswalk key without affecting the other names in those lists.
        activity_to_sector_mapping: BEA_NIPA_FD_Structures
        selection_fields:
          Table: U50405 # Table 5.4.5. Private Fixed Investment in Structures by Type
          ActivityProducedBy: Net purchases of used structures
          Line: 48
        assign_fields:
          ActivityProducedBy: Net purchases of used structures (Residential) # matches crosswalk key
          ActivityConsumedBy: Residential Investment
        attribution_method: proportional
        attribution_source:
          BEA_Detail_Use_SUT:
            <<: *bea
            selection_fields:
              ActivityConsumedBy: {'F02R00': ''}

      FD_Structures2:
        activity_to_sector_mapping: BEA_NIPA_FD_Structures
        selection_fields:
          Table: U50405 # Table 5.4.5. Private Fixed Investment in Structures by Type
          ActivityProducedBy:
           - Office
           - Health care
           - Multimerchandise shopping
           - Food and beverage establishments
           - Warehouses
           - Other commercial
           - Manufacturing
           - Power and communication
           - Petroleum and natural gas
           - Mining
           - Religious
           - Educational and vocational
           - Lodging
           - Amusement and recreation
           - Transportation
           - Farm
           - Other
           - "Brokers' commissions on sale of structures"
        assign_fields:
          ActivityConsumedBy: Nonresidential Investment in Structures
        attribution_method: proportional
        attribution_source:
          BEA_Detail_Use_SUT:
            <<: *bea
            selection_fields:
              ActivityConsumedBy: {'F02S00': ''}

      FD_Structures2_used:
        # See note on FD_Structures1_used: this is the Nonresidential (line 38) occurrence.
        activity_to_sector_mapping: BEA_NIPA_FD_Structures
        selection_fields:
          Table: U50405 # Table 5.4.5. Private Fixed Investment in Structures by Type
          ActivityProducedBy: Net purchases of used structures
          Line: 38
        assign_fields:
          ActivityProducedBy: Net purchases of used structures (Nonresidential) # matches crosswalk key
          ActivityConsumedBy: Nonresidential Investment in Structures
        attribution_method: proportional
        attribution_source:
          BEA_Detail_Use_SUT:
            <<: *bea
            selection_fields:
              ActivityConsumedBy: {'F02S00': ''}
