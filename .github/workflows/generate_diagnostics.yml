name: generate_diagnostics

on:
  workflow_dispatch:
    inputs:
      config_name:
        description: "USA config name (without .yaml extension)"
        required: true
        type: string
        default: "v8_ceda_2025_usa"
      sheet_id:
        description: "Google Sheets ID for EF diagnostics"
        required: true
        type: string
      pr_url:
        description: "PR URL associated with this diagnostics run (optional)"
        required: false
        type: string
        default: ""
      use_useeio_baseline:
        description: "Benchmark to USEEIO GCS Excel baseline (URI, SHA, label from useeio_baseline_pin.json)"
        required: false
        type: boolean
        default: false
      model_base_year:
        description: "Override model_base_year (e.g. 2019..2024). Leave empty to use the YAML's value."
        required: false
        type: string
        default: ""
      usa_ghg_data_year:
        description: "Override usa_ghg_data_year (e.g. 2019..2024). Leave empty to use the YAML's value."
        required: false
        type: string
        default: ""

env:
  FORCE_COLOR: 2

# Belt-and-suspenders against the Sheets-API write quota. The dispatcher
# in `bedrock/analysis/a_matrix_time_series/dispatch_ef_time_series.py`
# polls for capacity client-side; this directive is the safety net
# preventing accidental parallel runs (e.g. UI-triggered ones) from
# overlapping. With `cancel-in-progress: false`, any third concurrent
# dispatch is dropped — the dispatcher's polling avoids that case.
concurrency:
  group: generate_diagnostics
  cancel-in-progress: false

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python and install dependencies
        uses: ./.github/actions/setup-python

      - name: Authenticate with Google Cloud
        uses: "google-github-actions/auth@v2"
        with:
          project_id: cornerstone-data
          workload_identity_provider: projects/75718421862/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: github-actions-cornerstone@cornerstone-data.iam.gserviceaccount.com

      - name: Generate diagnostics
        id: generate
        run: |
          if [ "${{ github.event.inputs.use_useeio_baseline }}" = "true" ]; then
            uv run python bedrock/utils/validation/generate_diagnostics.py \
              --sheet_id "${{ github.event.inputs.sheet_id }}" \
              --config_name "${{ github.event.inputs.config_name }}" \
              --git_branch "${{ github.ref_name }}" \
              ${{ github.event.inputs.pr_url && format('--pr_url "{0}"', github.event.inputs.pr_url) || '' }} \
              ${{ github.event.inputs.model_base_year && format('--model_base_year {0}', github.event.inputs.model_base_year) || '' }} \
              ${{ github.event.inputs.usa_ghg_data_year && format('--usa_ghg_data_year {0}', github.event.inputs.usa_ghg_data_year) || '' }} \
              --useeio_baseline_pin_json bedrock/utils/snapshots/useeio_baseline_pin.json
          else
            uv run python bedrock/utils/validation/generate_diagnostics.py \
              --sheet_id "${{ github.event.inputs.sheet_id }}" \
              --config_name "${{ github.event.inputs.config_name }}" \
              --git_branch "${{ github.ref_name }}" \
              ${{ github.event.inputs.pr_url && format('--pr_url "{0}"', github.event.inputs.pr_url) || '' }} \
              ${{ github.event.inputs.model_base_year && format('--model_base_year {0}', github.event.inputs.model_base_year) || '' }} \
              ${{ github.event.inputs.usa_ghg_data_year && format('--usa_ghg_data_year {0}', github.event.inputs.usa_ghg_data_year) || '' }}
          fi

  notify_slack_failure:
    needs: diagnostics
    runs-on: ubuntu-latest
    if: always() && needs.diagnostics.result == 'failure'

    steps:
      - name: Notify on Slack - failure
        uses: slackapi/slack-github-action@v1.24.0
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_TOKEN }}
        with:
          channel-id: C09S03U9CH4 # #alerts-bedrock
          payload: |
            {
              "text": "Bedrock Diagnostics Generation Failure",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                      "type": "mrkdwn",
                      "text": ":warning: *Bedrock Diagnostics Generation Failure*\nDiagnostics failed on `${{ github.ref_name }}` `${{ github.sha }}`\n\n*Configuration:* ${{ github.event.inputs.config_name }}\n*USEEIO baseline:* ${{ github.event.inputs.use_useeio_baseline }}\n*Target Google Sheets URL:* https://docs.google.com/spreadsheets/d/${{ github.event.inputs.sheet_id }}"
                  },
                  "accessory": {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "View logs"
                    },
                    "url": "${{ github.event.repository.html_url }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }

  notify_slack_success:
    needs: diagnostics
    runs-on: ubuntu-latest
    if: always() && needs.diagnostics.result == 'success'

    steps:
      - name: Notify on Slack - success
        uses: slackapi/slack-github-action@v1.24.0
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_TOKEN }}
        with:
          channel-id: C09S03U9CH4 # #alerts-bedrock
          payload: |
            {
              "text": "Bedrock Diagnostics Generation Success",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                      "type": "mrkdwn",
                      "text": ":white_check_mark: *Bedrock Diagnostics Generation Success*\nDiagnostics generated on `${{ github.ref_name }}` `${{ github.sha }}`\n\n*Configuration:* ${{ github.event.inputs.config_name }}\n*USEEIO baseline:* ${{ github.event.inputs.use_useeio_baseline }}\n*Google Sheets URL:* https://docs.google.com/spreadsheets/d/${{ github.event.inputs.sheet_id }}"
                  },
                  "accessory": {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "View logs"
                    },
                    "url": "${{ github.event.repository.html_url }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
